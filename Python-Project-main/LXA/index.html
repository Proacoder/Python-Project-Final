<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary:   #0a0e27;
    --bg-secondary: #111633;
    --bg-tertiary:  #1a1f3a;
    --border:       #2d3561;
    --text-primary: #f0f4f8;
    --text-muted:   #8b92b4;
    --accent-main:  #6366f1;
    --accent-light: #818cf8;
    --accent-glow:  #c7d2fe;
    --user-bg:      #312e81;
    --user-border:  #4f46e5;
    --bot-bg:       #1f2937;
    --bot-border:   #374151;
    --success:      #10b981;
    --error:        #ef4444;
    --warning:      #f59e0b;
    --radius:       12px;
    --font-main:    'Inter', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;
    --shadow-sm:    0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md:    0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-lg:    0 8px 24px rgba(0, 0, 0, 0.5);
  }
  html { height: 100%; }
  body {
    font-family: var(--font-main);
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(26, 31, 58, 0.6);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
  }
  .header-info h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 2px; }
  .header-info p { font-size: 12px; color: var(--text-muted); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-indicator { display: flex; align-items: center; gap: 6px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); animation: pulse 2s infinite;
  }
  .status-dot.thinking { background: var(--warning); box-shadow: 0 0 8px rgba(245, 158, 11, 0.6); }
  .status-dot.error { background: var(--error); box-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .header-btn {
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid var(--accent-main);
    color: var(--accent-light);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: var(--font-main);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .header-btn:hover { background: rgba(99, 102, 241, 0.2); border-color: var(--accent-light); }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; transition: background 0.2s; }
  #messages::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 85%;
    animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .msg-row.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-row.bot { align-self: flex-start; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .avatar.bot { background: linear-gradient(135deg, #1f2937, #2d3561); border: 1px solid var(--bot-border); }
  .avatar.user { background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; }
  .bubble-wrapper { display: flex; flex-direction: column; gap: 4px; }
  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    transition: all 0.2s;
    position: relative;
  }
  .bubble.user {
    background: linear-gradient(135deg, var(--user-bg) 0%, #3730a3 100%);
    border: 1px solid var(--user-border);
    border-bottom-right-radius: 4px;
    color: #ddd6fe;
    box-shadow: var(--shadow-sm);
  }
  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--bot-border);
    border-bottom-left-radius: 4px;
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .bubble.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--error);
    color: var(--error);
  }
  .msg-time { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
  .bubble-actions { display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity 0.2s; }
  .msg-row:hover .bubble-actions { opacity: 1; }
  .action-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border);
    background: rgba(99, 102, 241, 0.1);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .action-btn:hover { background: rgba(99, 102, 241, 0.2); color: var(--accent-light); }
  .bubble pre {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
  }
  .bubble code { font-family: var(--font-mono); color: #c7d2fe; }
  .typing-dots { display: flex; gap: 4px; align-items: center; }
  .typing-dots span {
    width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { opacity: 0.4; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-6px); } }
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 2rem;
  }
  #empty-state .icon { font-size: 52px; margin-bottom: 6px; opacity: 0.8; }
  #empty-state h2 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
  #empty-state p { font-size: 13px; color: var(--text-muted); max-width: 300px; }
  #suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 1rem 0.8rem;
    flex-shrink: 0;
    justify-content: center;
  }
  .suggestion-chip {
    background: rgba(99, 102, 241, 0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font-main);
    transition: all 0.2s;
    font-weight: 500;
  }
  .suggestion-chip:hover { background: rgba(99, 102, 241, 0.15); border-color: var(--accent-main); color: var(--accent-light); }
  #input-area {
    padding: 1rem;
    border-top: 1px solid var(--border);
    background: rgba(26, 31, 58, 0.4);
    flex-shrink: 0;
    backdrop-filter: blur(10px);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 14px;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .input-row:focus-within { border-color: var(--accent-main); background: rgba(99, 102, 241, 0.05); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1); }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 14px;
    font-family: var(--font-main);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 6px 0;
  }
  #user-input::placeholder { color: var(--text-muted); }
  .input-actions { display: flex; gap: 6px; align-items: flex-end; }
  .input-btn {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    background: var(--accent-main);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-weight: 600;
  }
  .input-btn:hover:not(:disabled) { background: var(--accent-light); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); transform: translateY(-1px); }
  .input-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 6px; padding-right: 4px; }
  .char-count.warn { color: var(--warning); }
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text-primary);
    font-size: 13px;
    box-shadow: var(--shadow-md);
    animation: slideUp 0.3s ease;
    z-index: 1000;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 640px) {
    .msg-row { max-width: 95%; }
    header { padding: 0.8rem 1rem; }
    #messages { padding: 1rem 0.5rem; }
    #input-area { padding: 0.8rem; }
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">✨</div>
    <div class="header-info">
      <h1>Gemini AI</h1>
      <p>Powered by Google Gemini 2.5</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span style="font-size: 12px; color: var(--text-muted);" id="status-text">Ready</span>
    </div>
    <button class="header-btn" id="reset-btn">🔄 New Chat</button>
    <button class="header-btn" id="back-btn" onclick="goBack()" style="border-color: #ef4444 !important; color: #ef4444 !important; font-weight: 700;">← Back</button>
  </div>
</header>
<div id="messages">
  <div id="empty-state">
    <div class="icon">✨</div>
    <h2>Chat with Gemini</h2>
    <p>Ask me anything — code, creative writing, analysis, or just a conversation.</p>
  </div>
</div>
<div id="suggestions">
  <button class="suggestion-chip" onclick="useChip(this)">Explain quantum physics</button>
  <button class="suggestion-chip" onclick="useChip(this)">Write Python code</button>
  <button class="suggestion-chip" onclick="useChip(this)">Create story ideas</button>
  <button class="suggestion-chip" onclick="useChip(this)">Math help</button>
  <button class="suggestion-chip" onclick="useChip(this)">Travel tips</button>
  <button class="suggestion-chip" onclick="useChip(this)">Recipe ideas</button>
</div>
<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="What can I help you with today?" maxlength="4000"></textarea>
    <div class="input-actions">
      <button class="input-btn" id="send-btn" title="Send (Enter)">→</button>
    </div>
  </div>
  <div class="char-count" id="char-count">0 / 4000</div>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const resetBtn = document.getElementById('reset-btn');
  const charCount = document.getElementById('char-count');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const suggestionsEl = document.getElementById('suggestions');
  let sessionId = localStorage.getItem('chat_session_id') || null;
  let isThinking = false;
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    const len = inputEl.value.length;
    charCount.textContent = `${len} / 4000`;
    charCount.classList.toggle('warn', len > 3800);
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);
  resetBtn.addEventListener('click', resetChat);
  function useChip(btn) {
    inputEl.value = btn.textContent;
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
  }
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isThinking) return;
    hideEmptyState();
    hideSuggestions();
    appendBubble('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    charCount.textContent = '0 / 4000';
    setThinking(true);
    const typingId = showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping(typingId);
      if (data.error) {
        appendBubble('bot', data.error, true);
        setStatus('error', 'Error');
      } else {
        sessionId = data.session_id;
        localStorage.setItem('chat_session_id', sessionId);
        appendBubble('bot', data.reply);
        setStatus('ok', 'Ready');
      }
    } catch (err) {
      removeTyping(typingId);
      appendBubble('bot', 'Could not reach the server. Is Flask running?', true);
      setStatus('error', 'Disconnected');
    }
    setThinking(false);
  }
  async function resetChat() {
    if (sessionId) {
      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      }).catch(() => {});
      localStorage.removeItem('chat_session_id');
      sessionId = null;
    }
    messagesEl.innerHTML = '';
    showEmptyState();
    showSuggestions();
    setStatus('ok', 'Ready');
    showToast('Chat cleared');
  }
  function appendBubble(role, text, isError = false) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? '👤' : '🤖';
    const wrapper = document.createElement('div');
    wrapper.className = 'bubble-wrapper';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
    bubble.innerHTML = role === 'bot' && !isError ? formatText(text) : text;
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const actions = document.createElement('div');
    actions.className = 'bubble-actions';
    actions.innerHTML = `<button class="action-btn" onclick="copyMessage(this)" title="Copy">📋</button>`;
    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    wrapper.appendChild(actions);
    row.appendChild(avatar);
    row.appendChild(wrapper);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function formatText(text) {
    let formatted = text;
    formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
    formatted = formatted.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
    formatted = formatted.replace(/\n/g, '<br>');
    return formatted;
  }
  function copyMessage(btn) {
    const text = btn.closest('.bubble-wrapper').querySelector('.bubble').innerText;
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied to clipboard');
    });
  }
  function showTyping() {
    const id = 'typing-' + Date.now();
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = id;
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🤖';
    const wrapper = document.createElement('div');
    wrapper.className = 'bubble-wrapper';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    wrapper.appendChild(bubble);
    row.appendChild(avatar);
    row.appendChild(wrapper);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }
  function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
  function hideEmptyState() { const el = document.getElementById('empty-state'); if (el) el.remove(); }
  function showEmptyState() {
    const el = document.createElement('div');
    el.id = 'empty-state';
    el.innerHTML = `<div class="icon">✨</div><h2>Chat with Gemini</h2><p>Ask me anything — code, creative writing, analysis, or just a conversation.</p>`;
    messagesEl.appendChild(el);
  }
  function hideSuggestions() { suggestionsEl.style.display = 'none'; }
  function showSuggestions() { suggestionsEl.style.display = 'flex'; }
  function setThinking(val) { isThinking = val; sendBtn.disabled = val; if (val) setStatus('thinking', 'Thinking...'); }
  function setStatus(state, text) { statusDot.className = 'status-dot' + (state === 'ok' ? '' : ` ${state}`); statusText.textContent = text; }
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  function goBack() {
    if (window.parent !== window) {
      window.parent.postMessage({ action: 'goBack' }, '*');
    } else {
      window.history.back();
    }
  }
</script>
</body>
</html>
